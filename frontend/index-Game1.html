<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="images/icons/pokeball.png">
    <link rel="stylesheet" href="style/style-index-game1.css">
    <link rel="stylesheet" href="style/style-menu.css">
    <script src="script/index-game1.js" defer></script>
    <title>PokéShots - Game</title>
</head>
<body>

    <div class="flash-capture" id="flash-capture"></div>
    <div class="explosion-container" id="explosion-container"></div>
    <div class="capture-overlay" id="capture-overlay">
        <div class="pokemon-reveal" id="pokemon-reveal">
            <img id="pk-reveal-img" src="" />
        </div>
        <div class="capture-msg" id="capture-msg"></div>
        <div class="shockwave" id="shockwave"></div>
    </div>
    <div id="menu"></div>
    <script src="script/menu.js" defer></script>
    <div class="background">
        <div class="pokedex">
            <div class="pokemobile"></div>
            <div class="botaohome">
                <a href="index.html" class="botaohomelink"></a>
            </div>
            <div class="botaojogo1">
            </div>
            <div class="botaojogo2">
            </div>
            <div class="botaojogo3">
            </div>
            <div class="telapkm">
                <div class="mensagem">
                    <span>Um pokémon selvagem apareceu...</span>
                </div>
                <div class="pokeic">
                </div>
                <div class="grama">
                    <div class="pokemon">
                    </div>
                </div>
            </div>
            <div class="entradadado">
                <div class="envia">
                </div>
            </div>
            <div class="iconepoke">
                <div class="poke">
                </div>
            </div>
            <div class="estatistica">
                <div class="legendacor">
                    <div class="item">
                        <div class="correto"></div>
                        <span>Correto</span>
                    </div>
                    <div class="item">
                        <div class="parcial"></div>
                        <span>Parcial</span>
                    </div>
                    <div class="item">
                        <div class="incorreto"></div>
                        <span>Incorreto</span>
                    </div>
                </div>
                <div class="infos">
                    <div class="infoitem">
                        <div class="pokm"></div>
                        <span>Pokémon</span>
                    </div>
                    <div class="infoitem">
                        <div class="ptipo"></div>
                        <span>1° Tipo</span>
                    </div>
                    <div class="infoitem">
                        <div class="stipo"></div>
                        <span>2° Tipo</span>
                    </div>
                    <div class="infoitem">
                        <div class="habitat"></div>
                        <span>Habitat</span>
                    </div>
                    <div class="infoitem">
                        <div class="cores"></div>
                        <span>Cor(es)</span>
                    </div>
                    <div class="infoitem">
                        <div class="altura"></div>
                        <span>Altura</span>
                    </div>
                    <div class="infoitem">
                        <div class="faseevolucao"></div>
                        <span>Fase de Evolução</span>
                    </div>
                </div>
                <div class="tentativas">
                    <div class="tbox">
                        <div class="titem">
                            <div class="itpokm"></div>
                            <span></span>
                        </div>
                        <div class="titem">
                            <div class="itptipo"></div>
                            <span></span>
                        </div>
                        <div class="titem">
                            <div class="itstipo"></div>
                            <span></span>
                        </div>
                        <div class="titem">
                            <div class="ithabitat"></div>
                            <span></span>
                        </div>
                        <div class="titem">
                            <div class="itcores"></div>
                            <span></span>
                        </div>
                        <div class="titem">
                            <div class="italtura"></div>
                            <span></span>
                        </div>
                        <div class="titem">
                            <div class="itfaseevolucao"></div>
                            <span></span>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
